<!DOCTYPE html>
<html>
<head>
    <title>KICT AR Navigation</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="level1.js"></script>
    <script src="level2.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="level-toast">System Ready</div>

    <div class="nav-container">
        <button class="nav-button" onclick="initLevel(1)">Level 1</button>
        <button class="nav-button" onclick="initLevel(2)">Level 2</button>
    </div>

    <div id="destination-menu">
    <button class="dest-btn" onclick="setDestination('Mens Toilet 1')">Mens Toilet 1</button>
    <button class="dest-btn" onclick="setDestination('CITA Classroom')">CITA Classroom</button>
    <button class="dest-btn" onclick="setDestination('LR6')">LR6</button>
    <button class="dest-btn" onclick="setDestination('none')" style="background: #ff4444; border-color: white;">Clear</button>
    </div>

    <a-scene
        embedded 
        vr-mode-ui="enabled: false"
        renderer="antialias: false; precision: medium;" 
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; trackingMethod: best; maxDetectionRate: 30; debugUIEnabled: false;">
        
        <a-entity id="level1-group" visible="false">
        <a-entity id="l1-content"></a-entity>
        </a-entity>

        <a-entity id="level2-group" visible="false">
        <a-entity id="l2-content"></a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Initialize the target at the very top
var currentTarget = "none"; 

function setDestination(target) {
    console.log("Setting destination to: " + target);
    currentTarget = target;
    
    // Refresh the content
    const l1Content = document.querySelector('#l1-content');
    if(l1Content) {
        l1Content.innerHTML = loadLevel1();
    }
}

// This function makes sure the arrows are drawn the MOMENT the page loads
window.addEventListener('load', () => {
    setTimeout(() => {
        const l1Content = document.querySelector('#l1-content');
        if (l1Content && typeof loadLevel1 === "function") {
            l1Content.innerHTML = loadLevel1();
            console.log("Level 1 Arrows Initialized");
        }
    }, 2000); // Wait 2 seconds for AR.js to warm up
});
