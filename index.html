<!DOCTYPE html>
<html>
<head>
    <title>KICT AR Navigation</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="level1.js"></script>
    <script src="level2.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="nav-container">
        <button class="nav-button" onclick="initLevel(1)">Level 1</button>
        <button class="nav-button" onclick="initLevel(2)">Level 2</button>
    </div>

    <a-scene
        embedded 
        vr-mode-ui="enabled: false"
        renderer="antialias: false; precision: medium;" 
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; trackingMethod: best; maxDetectionRate: 30; debugUIEnabled: false;">
        
        <a-entity id="level1-group" visible="false">
        <a-entity id="l1-content"></a-entity>
        </a-entity>

        <a-entity id="level2-group" visible="false">
        <a-entity id="l2-content"></a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
    function initLevel(lvl) {
        // We add a check to see if the function actually exists yet
        if (typeof loadLevel1 !== "function") {
            console.error("Functions not loaded yet. Retrying...");
            return; 
        }

        const container = document.querySelector('#level-container');
        try {
            if (lvl === 1) {
                container.innerHTML = loadLevel1();
            } else {
                container.innerHTML = loadLevel2();
            }
        } catch (err) {
            console.error("Error injecting HTML:", err);
        }
    }

window.onload = function() {
        try {
            const l1Content = document.querySelector('#l1-content');
            const l2Content = document.querySelector('#l2-content');
            
            // Inject HTML from your .js files ONLY ONCE
            l1Content.innerHTML = loadLevel1();
            l2Content.innerHTML = loadLevel2();
            
            console.log("Assets pre-loaded to memory.");
        } catch (e) {
            console.error("Error pre-loading levels:", e);
        }
    };

    function initLevel(lvl) {
        const l1 = document.querySelector('#level1-group');
        const l2 = document.querySelector('#level2-group');

        // Instead of innerHTML (heavy), we use .setAttribute (light)
        if (lvl === 1) {
            l1.setAttribute('visible', 'true');
            l2.setAttribute('visible', 'false');
        } else {
            l1.setAttribute('visible', 'false');
            l2.setAttribute('visible', 'true');
        }
        
        // Use console.log instead of alert to prevent camera freezing
        console.log("Switched to Level " + lvl);
    }
</script>
</body>
