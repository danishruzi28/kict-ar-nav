<!DOCTYPE html>
<html>
<head>
    <title>KICT AR Navigation</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="level1.js"></script>
    <script src="level2.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <div class="nav-container">
        <button class="nav-button" onclick="initLevel(1)">Level 1</button>
        <button class="nav-button" onclick="initLevel(2)">Level 2</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
        
        <a-entity id="level-container"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        alert("Script is Running !");
    function initLevel(lvl) {
        console.log("Function initLevel called for Level:", lvl);
        const container = document.querySelector('#level-container');
        
        if (!container) {
            console.error("CRITICAL: #level-container not found!");
            return;
        }

        try {
            if (lvl === 1) {
                container.innerHTML = loadLevel1();
            } else {
                container.innerHTML = loadLevel2();
            }
            alert("Loaded Level " + lvl);
        } catch (err) {
            console.error("JS Error: Check if level1.js is loaded.", err);
            alert("Error: level1.js or level2.js might be missing!");
        }
    }

    // Wait for the full page and all scripts to be ready
    document.addEventListener('DOMContentLoaded', () => {
        console.log("DOM Ready. Waiting 2 seconds for AR.js...");
        setTimeout(() => {
            initLevel(1);
        }, 2000); 
    });
</script>
</body>
