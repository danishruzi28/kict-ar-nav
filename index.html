<!DOCTYPE html>
<html>
  <head>
    <title>KICT Indoor AR Nav</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        <a-text value="Go to Lab 1 ->" position="-1 1 0" color="yellow" width="4"></a-text>
        
        <a-entity 
          geometry="primitive: cone; radiusBottom: 0.2; height: 1" 
          rotation="0 0 -90" 
          position="1 0.5 0" 
          material="color: cyan">
        </a-entity>
      </a-marker>

      <a-marker type="barcode" value="5">
        <a-text value="<- Elevator this way" position="-1 1 0" color="red"></a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
