<!DOCTYPE html>
<html>
<head>
    <title>KICT AR Navigation</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="level1.js"></script>
    <script src="level2.js"></script>
</head>

<body style="margin: 0; overflow: hidden; background-color: transparent;">

    <div id="ui-overlay">
        
        <div id="destination-menu" style="max-height: 70vh; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 10px;">
    <h3 style="color: #00FFFF; margin: 5px 0; font-family: sans-serif; font-size: 14px;">KICT LEVEL 1</h3>
    
    <button class="dest-btn" onclick="setDestination('Elevator')">Elevator 🛗</button>
    <button class="dest-btn" onclick="setDestination('Mens Toilet 1')">Mens Toilet 1 🚹</button>
    <button class="dest-btn" onclick="setDestination('Ladies Toilet 2')">Ladies Toilet 2 🚺</button>
    <button class="dest-btn" onclick="setDestination('Sink 1')">Sink 1</button>
    <button class="dest-btn" onclick="setDestination('Sink 2')">Sink 2</button>
    
    <button class="dest-btn" onclick="setDestination('Cafe 1')">Cafe 1</button>
    <button class="dest-btn" onclick="setDestination('Cafe 2')">Cafe 2</button>
    <button class="dest-btn" onclick="setDestination('Cafe 3')">Cafe 3</button>
    <button class="dest-btn" onclick="setDestination('Print')">Print Shop</button>
    <button class="dest-btn" onclick="setDestination('Coop')">Coop</button>
    
    <button class="dest-btn" onclick="setDestination('CITA Lecture Room')">CITA Lecture Room</button>
    <button class="dest-btn" onclick="setDestination('CITA Classroom')">CITA Classroom</button>
    <button class="dest-btn" onclick="setDestination('CITA Lab')">CITA Lab</button>
    
    <button class="dest-btn" onclick="setDestination('LR1')">LR1</button>
    <button class="dest-btn" onclick="setDestination('LR2')">LR2</button>
    <button class="dest-btn" onclick="setDestination('LR3')">LR3</button>
    <button class="dest-btn" onclick="setDestination('LR4')">LR4</button>
    <button class="dest-btn" onclick="setDestination('LR5')">LR5</button>
    <button class="dest-btn" onclick="setDestination('LR6')">LR6</button>
    
    <button class="dest-btn" onclick="setDestination('ICTSS')">ICTSS</button>
    <button class="dest-btn" onclick="setDestination('Student Lounge Male')">Student Lounge (M)</button>
    <button class="dest-btn" onclick="setDestination('Student Lounge Female')">Student Lounge (F)</button>
    
    <button class="dest-btn" onclick="setDestination('TL-C1-01')">TL-C1-01</button>
    <button class="dest-btn" onclick="setDestination('TL-C1-02')">TL-C1-02</button>
    <button class="dest-btn" onclick="setDestination('TL-C1-03')">TL-C1-03</button>
    <button class="dest-btn" onclick="setDestination('TL-C1-04')">TL-C1-04</button>

    <button class="dest-btn" onclick="setDestination('Stairs 1')">Stairs 1</button>
    <button class="dest-btn" onclick="setDestination('Stairs 2')">Stairs 2</button>
    <button class="dest-btn" onclick="setDestination('Stairs 3')">Stairs 3</button>
    <button class="dest-btn" onclick="setDestination('Stairs 4')">Stairs 4</button>
    <button class="dest-btn" onclick="setDestination('Stairs 5')">Stairs 5</button>
    <button class="dest-btn" onclick="setDestination('Stairs 6')">Stairs 6</button>

    <button class="dest-btn" onclick="setDestination('none')" style="background: #ff4444; margin-top: 10px;">RESET</button>
</div>
    </div>

    <a-scene 
        embedded 
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: false; precision: medium;">
        
        <a-entity id="level1-group" visible="true">
            <a-entity id="l1-content"></a-entity>
        </a-entity>

        <a-entity id="level2-group" visible="false">
            <a-entity id="l2-content"></a-entity>
        </a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        var currentTarget = "none";
        var currentLevel = 1;

        // Function to set destination and update arrows
        function setDestination(target) {
            currentTarget = target;
            
            // Show toast reminder
            const toast = document.querySelector('#level-toast');
            toast.innerHTML = target === "none" ? "Navigation Cleared" : "Navigating to:<br>" + target;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 3000);

            // Re-render markers to update directions
            updateMarkers();
        }

        // Function to switch between Level 1 and Level 2
        function changeLevel(lvl) {
            currentLevel = lvl;
            const l1 = document.querySelector('#level1-group');
            const l2 = document.querySelector('#level2-group');

            if (lvl === 1) {
                l1.setAttribute('visible', 'true');
                l2.setAttribute('visible', 'false');
            } else {
                l1.setAttribute('visible', 'false');
                l2.setAttribute('visible', 'true');
            }
            updateMarkers();
        }

        // Helper to refresh HTML inside the level containers
        function updateMarkers() {
            try {
                document.querySelector('#l1-content').innerHTML = typeof loadLevel1 === "function" ? loadLevel1() : "";
                document.querySelector('#l2-content').innerHTML = typeof loadLevel2 === "function" ? loadLevel2() : "";
            } catch (e) {
                console.error("Error updating markers: ", e);
            }
        }

        // Initialization on Load
        window.addEventListener('load', () => {
            // Fill markers initially
            setTimeout(() => {
                updateMarkers();
                // Force camera resize fix
                window.dispatchEvent(new Event('resize'));
            }, 1500);
        });
    </script>
</body>
